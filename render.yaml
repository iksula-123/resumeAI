# Render blueprint for the FastAPI backend.
# In Render: New + → Blueprint → connect this repo → it reads this file.
# Set the secret env vars (marked sync:false) in the Render dashboard.
services:
  - type: web
    name: resumeai-pro-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.4"
      # ── Secrets: set these in the Render dashboard (sync:false = not in git) ──
      - key: DATABASE_URL          # Supabase session pooler URI (port 5432)
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: CORS_ORIGINS          # your Vercel URL, e.g. https://resumeai-pro.vercel.app
        sync: false
      # Optional (billing)
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
